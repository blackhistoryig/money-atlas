<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Money Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root,[data-theme="light"]{
      --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
      --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
      --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f3f0ec;--color-surface-offset-2:#edeae5;
      --color-border:rgba(40,37,29,.12);--color-divider:#dcd9d5;
      --color-text:#28251d;--color-text-muted:#6b6963;--color-text-faint:#9a9893;--color-text-inverse:#f9f8f4;
      --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-active:#0f3638;--color-primary-highlight:#cedcd8;
      --color-success:#437a22;--color-success-highlight:rgba(67,122,34,.12);
      --color-error:#a12c7b;--color-error-highlight:rgba(161,44,123,.12);
      --color-warning:#964219;--color-warning-highlight:rgba(150,66,25,.12);
      --color-blue:#006494;--color-blue-highlight:rgba(0,100,148,.12);
      --color-gold:#d19900;--color-gold-highlight:rgba(209,153,0,.12);
      --color-topbar-bg:rgba(247,246,242,.88);
      --color-row-hover:rgba(1,105,111,.04);
      --color-primary-faint:rgba(1,105,111,.1);
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow-md:0 10px 24px rgba(0,0,0,.08);--shadow-lg:0 18px 40px rgba(0,0,0,.12);
      --transition:180ms cubic-bezier(0.16,1,0.3,1);--sidebar-w:280px;--header-h:76px;
      --font-body:'Satoshi',Inter,system-ui,sans-serif;
    }
    [data-theme="dark"]{
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;--color-surface-offset:#1d1c1a;--color-surface-offset-2:#22211f;
      --color-border:rgba(255,255,255,.12);--color-divider:#262523;
      --color-text:#cdccca;--color-text-muted:#979590;--color-text-faint:#6e6c68;--color-text-inverse:#111;
      --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;--color-primary-highlight:rgba(79,152,163,.16);
      --color-success:#78b451;--color-success-highlight:rgba(120,180,81,.14);
      --color-error:#d163a7;--color-error-highlight:rgba(209,99,167,.14);
      --color-warning:#bb653b;--color-warning-highlight:rgba(187,101,59,.14);
      --color-blue:#5591c7;--color-blue-highlight:rgba(85,145,199,.14);
      --color-gold:#e8af34;--color-gold-highlight:rgba(232,175,52,.14);
      --color-topbar-bg:rgba(23,22,20,.88);
      --color-row-hover:rgba(79,152,163,.05);
      --color-primary-faint:rgba(79,152,163,.1);
      --shadow-sm:0 1px 2px rgba(0,0,0,.2);--shadow-md:0 10px 24px rgba(0,0,0,.25);--shadow-lg:0 18px 40px rgba(0,0,0,.34);
    }
    *{box-sizing:border-box}
    html,body{height:100%;overflow:hidden;margin:0}
    body{font-family:var(--font-body);font-size:var(--text-base);line-height:1.5;color:var(--color-text);background:var(--color-bg)}
    a{text-decoration:none;color:inherit}
    button,input,select{font:inherit;color:inherit}
    button{cursor:pointer;-webkit-tap-highlight-color:transparent}
    .skip-link{position:absolute;left:var(--space-4);top:-100px;background:var(--color-primary);color:var(--color-text-inverse);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);z-index:200}
    .skip-link:focus{top:var(--space-4)}
    .shell{display:grid;grid-template-columns:var(--sidebar-w) minmax(0,1fr);grid-template-rows:var(--header-h) minmax(0,1fr);height:100vh;height:100dvh}
    .sidebar{grid-row:1/-1;background:linear-gradient(180deg,var(--color-surface),var(--color-surface-offset));border-right:1px solid var(--color-border);padding:var(--space-6);overflow-y:auto;overscroll-behavior:contain;display:flex;flex-direction:column;gap:var(--space-6);z-index:40;}
    .brand{display:flex;align-items:center;gap:var(--space-3)}
    .brand svg{width:40px;height:40px;color:var(--color-primary)}
    .brand-title{font-size:var(--text-sm);font-weight:900}
    .brand-sub{font-size:var(--text-xs);color:var(--color-text-muted)}
    .section-label{color:var(--color-text-faint);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.12em;margin-bottom:var(--space-2)}
    .nav-group{display:grid;gap:var(--space-2)}
    .nav-btn{display:flex;align-items:center;gap:var(--space-3);width:100%;min-height:48px;padding:var(--space-3) var(--space-4);border:1px solid transparent;border-radius:var(--radius-lg);background:transparent;color:var(--color-text-muted);text-align:left;transition:all var(--transition);cursor:pointer}
    .nav-btn:hover,.nav-btn:focus-visible{background:var(--color-surface-2);color:var(--color-text);border-color:var(--color-border);outline:none}
    .nav-btn.active{background:var(--color-primary-highlight);color:var(--color-primary-active);border-color:transparent}
    .nav-icon{width:18px;height:18px;display:inline-grid;place-items:center;flex-shrink:0}
    .sidebar-card{padding:var(--space-4);border:1px solid var(--color-border);border-radius:var(--radius-xl);background:var(--color-surface-2);box-shadow:var(--shadow-sm)}
    .sidebar-card h3{margin:0 0 var(--space-2);font-size:var(--text-sm)}
    .sidebar-card p{margin:0 0 var(--space-4);font-size:var(--text-xs);color:var(--color-text-muted)}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:39;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
    .sidebar-overlay.visible{display:block}
    .topbar{grid-column:2;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--color-border);background:var(--color-topbar-bg);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);}
    .topbar-left{display:flex;align-items:center;gap:var(--space-4);min-width:0}
    .topbar h1{margin:0;font-size:var(--text-xl);line-height:1.05;font-weight:900;letter-spacing:-.02em}
    .topbar-sub{color:var(--color-text-muted);font-size:var(--text-sm);margin-top:var(--space-1)}
    .topbar-actions{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;justify-content:flex-end}
    .main{grid-column:2;min-width:0;overflow-y:auto;overscroll-behavior:contain;padding:var(--space-6)}
    .page{display:none;animation:fadeIn 180ms ease}
    .page.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .grid{display:grid;gap:var(--space-4)}
    .kpi-grid{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:var(--space-4)}
    .two-col{grid-template-columns:1.3fr 1fr;margin-bottom:var(--space-4)}
    .three-col{grid-template-columns:1.1fr 1.1fr .9fr;margin-bottom:var(--space-4)}
    .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);padding:var(--space-5);min-width:0}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-3);margin-bottom:var(--space-4)}
    .card-title{margin:0;font-size:var(--text-lg);line-height:1.15;font-weight:800}
    .card-note{color:var(--color-text-muted);font-size:var(--text-xs);margin-top:var(--space-1)}
    .kpi-card{position:relative;overflow:hidden}
    .kpi-card::after{content:"";position:absolute;inset:auto -18px -24px auto;width:96px;height:96px;border-radius:50%;background:var(--color-primary-faint);pointer-events:none}
    .eyebrow{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.12em;color:var(--color-text-faint);margin-bottom:var(--space-2)}
    .kpi-value{font-size:clamp(1.7rem,1.4rem + 1vw,2.4rem);line-height:1;font-weight:900;letter-spacing:-.03em;font-variant-numeric:tabular-nums lining-nums;margin-bottom:var(--space-2)}
    .delta{display:inline-flex;align-items:center;gap:var(--space-2);border-radius:var(--radius-full);padding:.3rem .65rem;font-size:var(--text-xs);font-weight:700;font-variant-numeric:tabular-nums lining-nums}
    .delta.up{background:var(--color-success-highlight);color:var(--color-success)}
    .delta.down{background:var(--color-error-highlight);color:var(--color-error)}
    .delta.flat{background:var(--color-blue-highlight);color:var(--color-blue)}
    .pill{display:inline-flex;align-items:center;gap:var(--space-2);padding:.35rem .7rem;border-radius:var(--radius-full);background:var(--color-surface-offset);color:var(--color-text-muted);font-size:var(--text-xs);font-weight:700}
    .btn{min-height:44px;border-radius:var(--radius-lg);border:1px solid var(--color-border);background:var(--color-surface-2);color:var(--color-text);padding:.75rem 1rem;font-size:var(--text-sm);font-weight:700;transition:all var(--transition);cursor:pointer}
    .btn:hover,.btn:focus-visible{transform:translateY(-1px);box-shadow:var(--shadow-sm);outline:none}
    .btn-primary{background:var(--color-primary);border-color:transparent;color:#fff}
    .btn-primary:hover,.btn-primary:focus-visible{background:var(--color-primary-hover)}
    .btn-ghost{background:transparent}
    .stack{display:flex;flex-direction:column;gap:var(--space-3)}
    .row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3)}
    .muted{color:var(--color-text-muted)}
    .mono{font-variant-numeric:tabular-nums lining-nums}
    .budget-bars,.goal-list,.account-list,.holdings-list,.sync-list,.insight-list{display:grid;gap:var(--space-3)}
    .bar-row{display:grid;gap:.45rem}
    .bar-meta{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);font-size:var(--text-sm);font-variant-numeric:tabular-nums lining-nums}
    .bar-track{height:10px;border-radius:var(--radius-full);background:var(--color-surface-offset-2);overflow:hidden}
    .bar-fill{height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--color-primary),var(--color-blue));width:0;transition:width 500ms ease}
    .bar-fill.warn{background:linear-gradient(90deg,var(--color-gold),var(--color-warning))}
    .bar-fill.danger{background:linear-gradient(90deg,var(--color-warning),#8f2644)}
    .bar-fill.good{background:linear-gradient(90deg,var(--color-success),var(--color-primary))}
    .table-wrap{overflow-x:auto;border:1px solid var(--color-border);border-radius:var(--radius-lg);background:var(--color-surface-2)}
    table{width:100%;border-collapse:collapse;min-width:600px}
    th,td{padding:.9rem 1rem;text-align:left;border-bottom:1px solid var(--color-border);font-size:var(--text-sm)}
    th{position:sticky;top:0;background:var(--color-surface-offset);z-index:1;color:var(--color-text-muted);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.08em}
    tbody tr:hover{background:var(--color-row-hover)}
    tbody tr:last-child td{border-bottom:0}
    .account-item,.holding-item,.insight-item{display:grid;grid-template-columns:auto 1fr auto;gap:var(--space-3);align-items:center;padding:var(--space-4);border:1px solid var(--color-border);border-radius:var(--radius-lg);background:var(--color-surface-2)}
    .icon-box{width:42px;height:42px;border-radius:12px;background:var(--color-primary-highlight);color:var(--color-primary-active);display:grid;place-items:center;font-weight:900;font-size:.85rem;flex-shrink:0}
    .icon-box.loan,.icon-box.student_loan{background:var(--color-warning-highlight);color:var(--color-warning)}
    .icon-box.mortgage{background:var(--color-gold-highlight);color:var(--color-gold)}
    .icon-box.credit{background:var(--color-error-highlight);color:var(--color-error)}
    .icon-box.invest,.icon-box.investment,.icon-box.retirement,.icon-box.crypto{background:var(--color-blue-highlight);color:var(--color-blue)}
    .account-name,.holding-name{font-weight:800;font-size:var(--text-sm)}
    .account-meta,.holding-meta,.insight-meta{color:var(--color-text-muted);font-size:var(--text-xs);margin-top:.2rem}
    .account-value,.holding-value{text-align:right;font-weight:900;font-variant-numeric:tabular-nums lining-nums;font-size:var(--text-sm)}
    .account-value span,.holding-value span{display:block;color:var(--color-text-muted);font-size:var(--text-xs);margin-top:.2rem;font-weight:600}
    .badge{display:inline-flex;align-items:center;gap:var(--space-1);padding:.25rem .55rem;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:800;margin-top:var(--space-2)}
    .badge-warn{background:var(--color-warning-highlight);color:var(--color-warning)}
    .badge-gold{background:var(--color-gold-highlight);color:var(--color-gold)}
    .legend{display:flex;gap:var(--space-3);flex-wrap:wrap;margin-top:var(--space-4)}
    .legend-item{display:inline-flex;align-items:center;gap:var(--space-2);color:var(--color-text-muted);font-size:var(--text-xs);font-weight:700}
    .swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .mobile-toggle{display:none}
    /* DIALOG — no method=dialog, fully JS-controlled */
    dialog{border:0;padding:0;width:min(640px,calc(100vw - 2rem));border-radius:var(--radius-xl);background:var(--color-surface);color:var(--color-text);box-shadow:var(--shadow-lg)}
    dialog::backdrop{background:rgba(0,0,0,.5);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
    .modal{padding:var(--space-6)}
    .modal h2{margin:0 0 var(--space-2);font-size:var(--text-lg)}
    .modal p{margin:0 0 var(--space-5);color:var(--color-text-muted);font-size:var(--text-sm)}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--space-4)}
    .field{display:grid;gap:var(--space-2)}
    .field.full{grid-column:1/-1}
    label{font-size:var(--text-xs);font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-muted)}
    input,select{min-height:46px;padding:.8rem .9rem;border-radius:var(--radius-lg);border:1px solid var(--color-border);background:var(--color-surface-2);outline:none;-webkit-appearance:none;appearance:none;width:100%}
    input:focus,select:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(1,105,111,.18)}
    .modal-actions{display:flex;justify-content:flex-end;gap:var(--space-3);margin-top:var(--space-6);flex-wrap:wrap}
    .empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:var(--space-16) var(--space-8);color:var(--color-text-muted)}
    .empty-state h3{color:var(--color-text);margin-bottom:var(--space-2)}
    .empty-state p{max-width:36ch;margin-bottom:var(--space-6)}
    #mortgageFields,#loanFields{display:none}
    @media (max-width:1180px){.kpi-grid,.two-col,.three-col{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:960px){
      .shell{grid-template-columns:1fr}
      .sidebar{position:fixed;inset:0 auto 0 0;width:min(320px,86vw);transform:translateX(-100%);transition:transform var(--transition);box-shadow:var(--shadow-lg);z-index:40;}
      .sidebar.open{transform:translateX(0)}
      .topbar,.main{grid-column:1}
      .mobile-toggle{display:inline-flex}
    }
    @media (max-width:720px){
      .main,.topbar{padding-inline:var(--space-4)}
      .kpi-grid,.two-col,.three-col,.form-grid{grid-template-columns:1fr}
      .topbar{align-items:flex-start}
      .topbar-actions{width:100%;justify-content:flex-start}
    }
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="shell">
  <aside class="sidebar" id="sidebar" aria-label="Navigation">
    <div class="brand">
      <svg viewBox="0 0 64 64" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="8" width="48" height="48" rx="16" stroke="currentColor" stroke-width="4"/><path d="M18 39C22 31 26 26 31 26C36 26 39 31 42 35C45 39 47 41 50 41" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><path d="M17 46H47" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><circle cx="32" cy="21" r="3.5" fill="currentColor"/></svg>
      <div><div class="brand-title">Money Atlas</div><div class="brand-sub">Budget. Invest. Track. Decide.</div></div>
    </div>
    <nav aria-label="Primary">
      <div class="section-label">Pages</div>
      <div class="nav-group" id="navGroup">
        <button class="nav-btn active" data-page="budget" type="button">
          <span class="nav-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          </span>
          <span>Budget</span>
        </button>
        <button class="nav-btn" data-page="investments" type="button">
          <span class="nav-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          </span>
          <span>Investments</span>
        </button>
        <button class="nav-btn" data-page="networth" type="button">
          <span class="nav-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </span>
          <span>Net Worth</span>
        </button>
        <button class="nav-btn" data-page="accounts" type="button">
          <span class="nav-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
          </span>
          <span>Accounts</span>
        </button>
        <button class="nav-btn" data-page="loans" type="button">
          <span class="nav-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 10v6M2 10l10-8 10 8"/><path d="M6 10v8h12v-8"/></svg>
          </span>
          <span>Student Loans</span>
        </button>
      </div>
    </nav>
    <div class="sidebar-card">
      <h3>The rule</h3>
      <p>Track cash first. Build assets. Kill high-rate debt fast. Equity is built one payment at a time.</p>
      <button class="btn btn-primary open-dialog-btn" type="button" style="wi
